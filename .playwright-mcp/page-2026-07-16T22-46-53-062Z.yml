    - generic [ref=e21]:
      - heading "What is a feedback MCP server?" [level=2] [ref=e22]
      - generic [ref=e23]:
        - paragraph [ref=e24]:
          - text: A feedback MCP server is a feedback collection tool that speaks the
          - link "Model Context Protocol" [ref=e25] [cursor=pointer]:
            - /url: https://modelcontextprotocol.io
          - text: ". Your apps submit feedback (bug reports, feature requests, NPS, anything you define) to a single self-hosted endpoint. Your AI assistant then connects to the same server as an MCP client and works with that feedback directly: listing, searching, aggregating, and summarizing it on demand."
        - paragraph [ref=e26]: "That flips the usual model. Instead of building dashboards and reading through submissions one by one, you ask questions in plain language and let the model do the reading. Feedback MCP keeps the pipeline minimal: declarative form schemas, one ingest endpoint, a small read API, an MCP server, and optional Slack cross-posting. Everything runs on your infrastructure."
