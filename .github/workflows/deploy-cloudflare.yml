name: Deploy (Cloudflare Workers + D1)

# Deploys the self-hosted app to Cloudflare Workers with a D1-backed database.
# This workflow is opt-in: it only runs when you set the required secrets and
# either push to main or trigger it manually. Forks without Cloudflare
# credentials are unaffected (the job is gated on the account id).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/server/**"
      - ".github/workflows/deploy-cloudflare.yml"

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    # Skip unless a Cloudflare account id is configured for the repo/org.
    if: vars.CLOUDFLARE_ACCOUNT_ID != ''
    defaults:
      run:
        working-directory: apps/server
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      DB_NAME: feedback-mcp-web-production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build (OpenNext for Cloudflare)
        run: pnpm build:cf

      # D1 cannot be auto-provisioned by `wrangler deploy` in a way that also
      # gives us the id for migrations, so create-if-missing then substitute
      # the resolved database_id into wrangler.jsonc (idempotent across retries).
      - name: Provision D1
        run: |
          set -euo pipefail
          existing=$(pnpm exec wrangler d1 list --json 2>/dev/null \
            | jq -r --arg n "$DB_NAME" '.[] | select(.name == $n) | .uuid' | head -n1)
          if [ -z "$existing" ]; then
            echo "Creating D1 database $DB_NAME"
            pnpm exec wrangler d1 create "$DB_NAME"
            existing=$(pnpm exec wrangler d1 list --json \
              | jq -r --arg n "$DB_NAME" '.[] | select(.name == $n) | .uuid' | head -n1)
          fi
          echo "D1 database id: $existing"
          sed -i "s/REPLACE_WITH_D1_DATABASE_ID/$existing/" wrangler.jsonc

      - name: Apply D1 migrations
        run: pnpm exec wrangler d1 migrations apply "$DB_NAME" --remote

      - name: Deploy
        run: pnpm exec wrangler deploy

      # Secrets must be pushed after the worker exists. A fresh CRON-style
      # value is not needed (no cron/queue), so only the app secrets are set.
      - name: Push secrets
        run: |
          set -euo pipefail
          jq -n \
            --arg MCP_SECRET "${{ secrets.MCP_SECRET }}" \
            --arg EXAMPLE_APP_INGEST_KEY "${{ secrets.EXAMPLE_APP_INGEST_KEY }}" \
            --arg SLACK_WEBHOOK_URL "${{ secrets.SLACK_WEBHOOK_URL }}" \
            --arg EXAMPLE_APP_SLACK_WEBHOOK "${{ secrets.EXAMPLE_APP_SLACK_WEBHOOK }}" \
            '{MCP_SECRET: $MCP_SECRET, EXAMPLE_APP_INGEST_KEY: $EXAMPLE_APP_INGEST_KEY, SLACK_WEBHOOK_URL: $SLACK_WEBHOOK_URL, EXAMPLE_APP_SLACK_WEBHOOK: $EXAMPLE_APP_SLACK_WEBHOOK}
             | with_entries(select(.value != ""))' \
            | pnpm exec wrangler secret bulk
