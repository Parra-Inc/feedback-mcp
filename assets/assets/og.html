<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: linear-gradient(135deg, #06110d 0%, #0b2019 55%, #081517 100%);
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black 40%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black 40%, transparent 100%);
    }

    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 900px;
      height: 560px;
      background: radial-gradient(ellipse at center, rgba(52, 211, 153, 0.14) 0%, transparent 68%);
      transform: translate(-50%, -50%);
    }

    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 120% 110% at 50% 50%, transparent 55%, rgba(3, 10, 8, 0.55) 100%);
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .mark {
      width: 108px;
      height: 108px;
      border-radius: 28px;
      background: linear-gradient(170deg, #123128 0%, #0c241d 100%);
      border: 2px solid rgba(52, 211, 153, 0.45);
      box-shadow:
        0 24px 70px rgba(0, 0, 0, 0.5),
        0 0 60px rgba(52, 211, 153, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 36px;
    }

    .bubble {
      width: 52px;
      height: 40px;
      border-radius: 14px;
      background: linear-gradient(160deg, #34d399, #0e9f6e);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      box-shadow: 0 8px 24px rgba(52, 211, 153, 0.35);
    }
    .bubble::after {
      content: '';
      position: absolute;
      bottom: -9px;
      left: 11px;
      width: 15px;
      height: 15px;
      background: #0e9f6e;
      clip-path: polygon(0 0, 100% 0, 0 100%);
    }
    .bubble .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(6, 17, 13, 0.85);
    }

    .kicker {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 4px;
      color: #34d399;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .title {
      font-size: 88px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -3.4px;
      line-height: 1;
      margin-bottom: 22px;
    }

    .subtitle {
      font-size: 26px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.65);
      letter-spacing: -0.2px;
      line-height: 1.45;
      max-width: 760px;
    }

    .subtitle strong { color: rgba(255, 255, 255, 0.92); font-weight: 600; }

    .repo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 34px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.75);
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 100px;
      padding: 11px 26px;
    }

    .repo .star { color: #f5c04e; }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>

  <div class="content">
    <div class="mark">
      <div class="bubble">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
    <div class="kicker">Self-hosted · Open source · MIT</div>
    <div class="title">Feedback MCP</div>
    <div class="subtitle"><strong>Collect user feedback from any app. Analyze it with Claude.</strong><br />One endpoint in, MCP out.</div>
    <div class="repo"><span class="star">★</span>github.com/Parra-Inc/feedback-mcp</div>
  </div>

  <div class="vignette"></div>
</body>
</html>
