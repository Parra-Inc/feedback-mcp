          - heading "One endpoint for all feedback" [level=3] [ref=e53]
          - paragraph [ref=e54]: "Apps POST to /api/v1/feedback with an ingest key. iOS, Android, web, desktop, or server: if it can make an HTTP request, it can send feedback."
        - generic [ref=e55]:
          - heading "Built-in MCP server" [level=3] [ref=e56]
          - paragraph [ref=e57]: Connect Claude Code, Claude Desktop, or any MCP client to /api/mcp and query your feedback with tools like list_feedback, search_feedback, and feedback_stats.
        - generic [ref=e58]:
          - heading "Forms as config, not code" [level=3] [ref=e59]
          - paragraph [ref=e60]: Define projects and forms as JSON files in a config folder. Each form declares a field schema that submissions are validated against with Zod. Easy for humans, trivial for LLMs.
        - generic [ref=e61]:
          - heading "PostgreSQL or SQLite" [level=3] [ref=e62]
          - paragraph [ref=e63]: Pick your database with one env var. SQLite means a single container with zero external dependencies; PostgreSQL is the production default.
        - generic [ref=e64]:
          - heading "Slack cross-posting" [level=3] [ref=e65]
          - paragraph [ref=e66]: Set a webhook URL and every submission is posted to Slack right after it hits the database, globally or per project. Your team sees feedback in real time.
        - generic [ref=e67]:
          - heading "Three-layer auth" [level=3] [ref=e68]
          - paragraph [ref=e69]: Public ingest keys for submitting, an MCP secret for reading and analysis, and optional end-user JWT verification (JWKS, PEM, or HMAC) to attach verified user identities to feedback.
