# Local development database only. To self-host the full app with Docker,
# use the compose files at the repository root.
services:
  postgres:
    image: postgres:17
    ports:
      - "5457:5432"
    environment:
      POSTGRES_USER: feedback
      POSTGRES_PASSWORD: feedback
      POSTGRES_DB: feedback
    volumes:
      - feedback-mcp-postgres:/var/lib/postgresql/data

volumes:
  feedback-mcp-postgres:
